name: Deploy Web App to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/index.html'
      - 'docs/og-image.png'
      - 'docs/press/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Export web bundle
        env:
          EXPO_PUBLIC_GOOGLE_MAPS_WEB_KEY: ${{ secrets.GOOGLE_MAPS_WEB_KEY }}
          INSTANT_APP_ID: ${{ secrets.INSTANT_APP_ID }}
        run: npx expo export --platform web --output-dir web-build

      - name: Merge into docs/
        run: |
          mkdir -p docs/app
          cp -r web-build/* docs/app/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - id: deployment
        uses: actions/deploy-pages@v4
