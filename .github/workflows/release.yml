name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck + lint
        run: |
          npm run typecheck
          npm run lint

      - name: Resolve release tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog section
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            /^## \[/ && flag { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            {
              echo "Forage for All $VERSION"
              echo ""
              echo "See the full changelog in [CHANGELOG.md](./CHANGELOG.md)."
            } > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(steps.resolve.outputs.tag, '-beta') || contains(steps.resolve.outputs.tag, '-rc') }}

  build-android:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Build Android APK via EAS
        id: eas
        env:
          INSTANT_APP_ID: ${{ secrets.INSTANT_APP_ID }}
          GOOGLE_MAPS_ANDROID_KEY: ${{ secrets.GOOGLE_MAPS_ANDROID_KEY }}
          GOOGLE_MAPS_IOS_KEY: ${{ secrets.GOOGLE_MAPS_IOS_KEY }}
        run: |
          eas build --profile preview --platform android --non-interactive --wait --json > build.json
          cat build.json
          URL=$(jq -r '.[0].artifacts.buildUrl' build.json)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        env:
          URL: ${{ steps.eas.outputs.url }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          curl -L "$URL" -o "forage-for-all-${VERSION}-preview.apk"
          ls -lh *.apk

      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: forage-for-all-*-preview.apk

  build-ios:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.release.outputs.tag, '-beta') && !contains(needs.release.outputs.tag, '-rc') }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Build iOS simulator bundle via EAS
        id: eas
        env:
          INSTANT_APP_ID: ${{ secrets.INSTANT_APP_ID }}
          GOOGLE_MAPS_IOS_KEY: ${{ secrets.GOOGLE_MAPS_IOS_KEY }}
          GOOGLE_MAPS_ANDROID_KEY: ${{ secrets.GOOGLE_MAPS_ANDROID_KEY }}
        run: |
          eas build --profile preview --platform ios --non-interactive --wait --json > build.json
          cat build.json
          URL=$(jq -r '.[0].artifacts.buildUrl' build.json)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download iOS build
        env:
          URL: ${{ steps.eas.outputs.url }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          curl -L "$URL" -o "forage-for-all-${VERSION}-ios-simulator.tar.gz"
          ls -lh forage-for-all-*

      - name: Attach iOS bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: forage-for-all-*-ios-simulator.tar.gz
