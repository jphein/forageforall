name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Export web app
        env:
          EXPO_PUBLIC_GOOGLE_MAPS_WEB_KEY: ${{ secrets.GOOGLE_MAPS_WEB_KEY }}
          INSTANT_APP_ID: ${{ secrets.INSTANT_APP_ID }}
          # GitHub Pages serves this repo at /forageforall/ and we stash
          # the Expo bundle under /app/, so every asset URL in index.html
          # needs to be prefixed with the full subpath.
          EXPO_BASE_URL: /forageforall/app
        run: npx expo export --platform web --output-dir web-build

      - name: Merge web app into docs/app/
        run: |
          mkdir -p docs/app
          cp -r web-build/* docs/app/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - id: deployment
        uses: actions/deploy-pages@v4
