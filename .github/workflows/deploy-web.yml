name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Export web app
        env:
          EXPO_PUBLIC_GOOGLE_MAPS_WEB_KEY: ${{ secrets.GOOGLE_MAPS_WEB_KEY }}
          INSTANT_APP_ID: ${{ secrets.INSTANT_APP_ID }}
          # GitHub Pages serves this repo at /forageforall/ and we stash
          # the Expo bundle under /app/, so every asset URL in index.html
          # needs to be prefixed with the full subpath.
          EXPO_BASE_URL: /forageforall/app
        run: npx expo export --platform web --output-dir web-build

      - name: Merge web app into docs/app/
        run: |
          mkdir -p docs/app
          cp -r web-build/* docs/app/
          # GH Pages serves a root-level 404.html for any unmatched path.
          # We want that fallback to load the SPA *only* for paths under
          # /forageforall/app/ — so dynamic routes like /app/listing/<id>
          # render correctly. Typos anywhere else (e.g. /forageforall/foo)
          # should still see a regular 404 page.
          cat > docs/404.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Page not found · Forage for All</title>
              <script>
                (function () {
                  var APP_PREFIX = "/forageforall/app/";
                  if (window.location.pathname.indexOf(APP_PREFIX) === 0) {
                    // Hand the URL to the SPA verbatim. The exported
                    // index.html is a full Expo Router bundle — it will
                    // read window.location and render the matched route.
                    fetch(APP_PREFIX, { cache: "no-store" })
                      .then(function (r) { return r.text(); })
                      .then(function (html) {
                        document.open();
                        document.write(html);
                        document.close();
                      });
                  }
                })();
              </script>
              <style>
                body { font-family: system-ui, sans-serif; padding: 4rem 2rem; max-width: 640px; margin: 0 auto; color: #3E2E1F; background: #F4EDDC; }
                h1 { font-size: 2rem; margin-bottom: 0.5rem; }
                a { color: #4F7A3A; }
              </style>
            </head>
            <body>
              <h1>Page not found</h1>
              <p>That page doesn't exist. <a href="/forageforall/">Back to Forage for All</a>.</p>
            </body>
          </html>
          EOF

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - id: deployment
        uses: actions/deploy-pages@v5
